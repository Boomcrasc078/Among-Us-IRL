<!doctype html>
<html id="html" data-bs-theme="dark">
	<head>
		<meta name="viewport" content="width=device-width,initial-scale=1.0" />
		<title>Among Us IRL</title>
		<link
			href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
			rel="stylesheet"
			integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
			crossorigin="anonymous"
		/>
		<link
			rel="stylesheet"
			href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
		/>
	</head>
	<body>
		<script
			src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
			integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
			crossorigin="anonymous"
		></script>
		<script src="/socket.io/socket.io.js"></script>
		<script>
			function updateColorMode() {
				const element = document.getElementById("html");
				element.setAttribute("data-bs-theme", cookieStore.get("theme"));
			}

			updateColorMode();

			async function setColorMode(mode) {
				if (mode == 0) {
					await cookieStore.set("theme", "light");
				} else if (mode == 1) {
					await cookieStore.set("theme", "dark");
				}
				updateColorMode();
			}
		</script>
		<main>
			<div class="container">
				<div class="px-4 py-5 my-5 text-center">
					<img
						class="d-block mx-auto mb-4"
						src=""
						alt=""
						width="72"
						height="57"
					/>
					<h1 class="display-5 fw-bold text-body-emphasis">Among Us IRL</h1>
					<div class="col-lg-6 mx-auto">
						<div class="d-grid gap-2 d-sm-flex justify-content-sm-center">
							<a class="btn btn-primary btn-lg px-4 gap-3" href="#"
								>Join Game</a
							>
							<a class="btn btn-outline-secondary btn-lg px-4" href="host.html"
								>Host Game</a
							>
						</div>
					</div>
					<br />
					<div class="col-lg-6 mx-auto">
						<div class="d-grid gap-2 d-sm-flex justify-content-sm-center">
							<div class="dropdown">
								<button
									class="btn btn-lg btn-primary dropdown-toggle"
									type="button"
									data-bs-toggle="dropdown"
									aria-expanded="false"
								>
									Color Mode
								</button>
								<ul class="dropdown-menu">
									<li>
										<button class="dropdown-item" onclick="setColorMode(0)">
											<i class="bi bi-sun"></i> Light
										</button>
									</li>
									<li>
										<button class="dropdown-item" onclick="setColorMode(1)">
											<i class="bi bi-moon"></i> Dark
										</button>
									</li>
								</ul>
							</div>
						</div>
					</div>
				</div>
			</div>
		</main>
	</body>
</html>
